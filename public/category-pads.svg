<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 320) rotate(35) scale(620 520)">
      <stop stop-color="#FCE7F3"/>
      <stop offset="0.55" stop-color="#F5D0FE" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#C4B5FD" stop-opacity="0.35"/>
    </radialGradient>
    <radialGradient id="bg2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 820) rotate(-15) scale(640 520)">
      <stop stop-color="#FEF3C7" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#A7F3D0" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="320" y1="320" x2="900" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DB2777" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#A855F7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" rx="64" fill="#FBFCFF"/>
  <rect width="1200" height="1200" rx="64" fill="url(#bg1)"/>
  <rect width="1200" height="1200" rx="64" fill="url(#bg2)"/>

  <!-- soft bokeh -->
  <g opacity="0.55" filter="url(#soft)">
    <circle cx="280" cy="860" r="120" fill="#F472B6" fill-opacity="0.22"/>
    <circle cx="930" cy="300" r="140" fill="#A855F7" fill-opacity="0.18"/>
    <circle cx="920" cy="920" r="170" fill="#60A5FA" fill-opacity="0.14"/>
  </g>

  <!-- abstract pad icon/card -->
  <g opacity="0.98">
    <rect x="300" y="280" width="600" height="720" rx="52" fill="#FFFFFF" fill-opacity="0.62" stroke="url(#stroke)" stroke-opacity="0.35"/>
    <rect x="360" y="360" width="480" height="560" rx="44" fill="#FFFFFF" fill-opacity="0.55" stroke="#111827" stroke-opacity="0.08"/>

    <!-- inner capsule -->
    <rect x="430" y="440" width="340" height="400" rx="170" fill="#FCE7F3" fill-opacity="0.9"/>
    <rect x="470" y="480" width="260" height="320" rx="130" fill="#EDE9FE" fill-opacity="0.85"/>

    <!-- sparkle marks -->
    <path d="M640 390 L654 420 L684 434 L654 448 L640 478 L626 448 L596 434 L626 420 Z" fill="#DB2777" fill-opacity="0.30"/>
    <path d="M520 850 L530 870 L552 880 L530 890 L520 910 L510 890 L488 880 L510 870 Z" fill="#2563EB" fill-opacity="0.22"/>
  </g>

  <!-- subtle lines -->
  <g opacity="0.35">
    <path d="M160 720 C 320 610, 420 820, 590 740 C 760 660, 860 840, 1040 740" stroke="url(#stroke)" stroke-width="2"/>
    <path d="M170 770 C 330 680, 430 870, 600 800 C 770 730, 880 890, 1030 820" stroke="url(#stroke)" stroke-width="2" stroke-opacity="0.7"/>
  </g>
</svg>
