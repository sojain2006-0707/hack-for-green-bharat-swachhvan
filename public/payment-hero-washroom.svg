      <stop offset="0.55" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EAF6FF"/>
    </linearGradient>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 220) rotate(35) scale(520 420)">
      <stop stop-color="#34D399" stop-opacity="0.22"/>
