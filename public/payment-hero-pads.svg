<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E9FFF4"/>
      <stop offset="0.55" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EAF6FF"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 220) rotate(35) scale(520 420)">
      <stop stop-color="#34D399" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 220) rotate(25) scale(620 520)">
      <stop stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-50" y="-50" width="1600" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBCFE8"/>
      <stop offset="1" stop-color="#F9A8D4"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#sky)"/>
  <circle cx="340" cy="220" r="340" fill="url(#glow1)"/>
  <circle cx="1080" cy="220" r="380" fill="url(#glow2)"/>

  <g opacity="0.22">
    <path d="M120 640 C 320 520, 520 760, 720 640 S 1120 680, 1280 560" stroke="#10B981" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 18"/>
    <path d="M140 720 C 340 600, 560 840, 760 720 S 1180 760, 1260 660" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 18"/>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="720" cy="560" rx="560" ry="240" fill="rgba(255,255,255,0.60)"/>
  </g>

  <!-- Packets -->
  <g filter="url(#shadow)">
    <rect x="260" y="410" width="280" height="170" rx="24" fill="url(#pink)" opacity="0.9"/>
    <rect x="290" y="445" width="220" height="18" rx="9" fill="rgba(255,255,255,0.50)"/>
    <rect x="290" y="475" width="180" height="18" rx="9" fill="rgba(255,255,255,0.35)"/>
    <rect x="290" y="505" width="200" height="18" rx="9" fill="rgba(255,255,255,0.42)"/>
  </g>

  <!-- Pads -->
  <g filter="url(#shadow)">
    <rect x="620" y="360" width="260" height="430" rx="86" fill="url(#pad)"/>
    <rect x="650" y="420" width="200" height="260" rx="70" fill="rgba(148,163,184,0.10)"/>
    <rect x="705" y="452" width="90" height="18" rx="9" fill="rgba(148,163,184,0.18)"/>
    <rect x="680" y="700" width="140" height="26" rx="13" fill="rgba(244,114,182,0.18)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="390" width="220" height="380" rx="80" fill="url(#pad)" opacity="0.96"/>
    <rect x="926" y="445" width="170" height="230" rx="64" fill="rgba(148,163,184,0.10)"/>
    <rect x="960" y="712" width="100" height="24" rx="12" fill="rgba(244,114,182,0.16)"/>
  </g>

  <!-- Little flowers -->
  <g opacity="0.75" filter="url(#shadow)">
    <circle cx="560" cy="640" r="26" fill="rgba(255,255,255,0.9)"/>
    <circle cx="560" cy="640" r="8" fill="rgba(250,204,21,0.75)"/>
    <circle cx="1030" cy="640" r="24" fill="rgba(255,255,255,0.9)"/>
    <circle cx="1030" cy="640" r="7" fill="rgba(250,204,21,0.75)"/>
  </g>
</svg>
